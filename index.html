<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BozoStore | متجر الأناقة</title>
    <style>
        body { background: #0a0a0c; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* الهيدر الاحترافي */
        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0c 100%); }
        .hero h1 { font-size: 3rem; margin: 0; background: linear-gradient(90deg, #00d4ff, #9d50bb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* شبكة المنتجات (السر هنا) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
        
        /* كارت المنتج الخرافي */
        .card { background: #16161a; border: 1px solid #2d2d3a; border-radius: 20px; padding: 25px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #00d4ff; transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,212,255,0.1); }
        .card h3 { margin-top: 0; color: #e1e1e6; }
        .price { color: #00d4ff; font-weight: bold; font-size: 1.5rem; margin: 15px 0; display: block; }
        button { background: linear-gradient(90deg, #00d4ff, #9d50bb); border: none; padding: 12px 30px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="hero">
        <h1>BozoStore 📱</h1>
        <p>أحدث التكنولوجيا بين يديك</p>
    </div>

    <div id="product-list" class="grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // تأكد من وضع بياناتك هنا بدقة
        const firebaseConfig = { /* ... */ }; 
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadData() {
            const list = document.getElementById("product-list");
            const snapshot = await getDocs(collection(db, "Mobile-store"));
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `
                    <div class="card">
                        <h3>${p.Mobile}</h3>
                        <span class="price">${p.Price} ج.م</span>
                        <button>اطلب الآن</button>
                    </div>
                `;
            });
        }
        loadData();
    </script>
</body>
</html>
